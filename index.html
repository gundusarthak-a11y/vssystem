```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroForge V4</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
    text-align: center;
}

#game {
    display: grid;
    grid-template-columns: repeat(6, 65px);
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}

.tile {
    width: 65px;
    height: 65px;
    border-radius: 12px;
    background: #1e293b;
    cursor: pointer;
    transition: 0.15s;
}

.tile:active {
    transform: scale(0.9);
}

.player { background: #22c55e !important; }
.goal { background: #3b82f6 !important; }
.fake { background: #f59e0b !important; }
.trap { background: #ef4444 !important; }

.flash {
    animation: flash 0.3s;
}

@keyframes flash {
    from { background: white; }
    to { background: inherit; }
}

#panel { margin-top: 15px; }
</style>
</head>

<body>

<h1>🧠 NeuroForge V4</h1>

<div id="game"></div>

<div id="panel">
<p id="status">Press Start</p>
<p>Score: <span id="score">0</span> | Best: <span id="best">0</span></p>
<p>Streak: <span id="streak">0</span></p>
<button onclick="startGame()">Start</button>
</div>

<script>
const size = 6;

let player, goal, fakeGoal, traps;
let score = 0, streak = 0, best = localStorage.getItem("best") || 0;
let difficulty = 1;
let memoryPhase = true;

const game = document.getElementById("game");

document.getElementById("best").innerText = best;

function rand() {
    return Math.floor(Math.random() * size * size);
}

function createGrid() {
    game.innerHTML = "";
    for (let i = 0; i < size*size; i++) {
        let tile = document.createElement("div");
        tile.className = "tile";
        tile.dataset.index = i;
        tile.onclick = () => move(i, tile);
        game.appendChild(tile);
    }
}

function render(show=false) {
    document.querySelectorAll(".tile").forEach(tile => {
        let i = +tile.dataset.index;
        tile.className = "tile";

        if (i === player) tile.classList.add("player");

        if (show) {
            if (i === goal) tile.classList.add("goal");
            if (i === fakeGoal) tile.classList.add("fake");
            if (traps.includes(i)) tile.classList.add("trap");
        }
    });
}

function startGame() {
    player = 0;
    goal = rand();
    fakeGoal = rand();
    traps = Array.from({length: difficulty+1}, rand);

    memoryPhase = true;

    createGrid();
    render(true);

    updateUI("Memorize...");

    setTimeout(() => {
        memoryPhase = false;
        render(false);
        updateUI("Act fast!");
        setTimeout(ruleShift, 4000 - difficulty*200);
    }, 2000);
}

function move(i, tile) {
    if (memoryPhase) return;

    tile.classList.add("flash");

    player = i;
    render(false);

    if (traps.includes(player)) {
        updateUI("💀 Trap!");
        streak = 0;
        difficulty = Math.max(1, difficulty-1);
        reset();
        return;
    }

    if (player === fakeGoal) {
        updateUI("⚠️ Fake!");
        return;
    }

    if (player === goal) {
        streak++;
        score += 10 * difficulty;

        if (score > best) {
            best = score;
            localStorage.setItem("best", best);
        }

        difficulty++;
        updateUI("🔥 Perfect!");

        reset();
    }
}

function ruleShift() {
    fakeGoal = goal;
    goal = rand();
    updateUI("⚠️ Shift!");
}

function reset() {
    setTimeout(startGame, 1000);
}

function updateUI(msg) {
    document.getElementById("status").innerText = msg;
    document.getElementById("score").innerText = score;
    document.getElementById("streak").innerText = streak;
    document.getElementById("best").innerText = best;
}
</script>

</body>
</html>
