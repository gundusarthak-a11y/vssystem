```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroForge V3 Elite</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle, #020617, #000);
    color: white;
    text-align: center;
}

h1 { margin-top: 10px; }

#game {
    display: grid;
    grid-template-columns: repeat(6, 65px);
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}

.tile {
    width: 65px;
    height: 65px;
    border-radius: 12px;
    background: #1e293b;
    cursor: pointer;
    transition: 0.15s;
}

.tile:hover {
    transform: scale(1.05);
}

.player { background: #22c55e !important; }
.goal { background: #3b82f6 !important; }
.fake { background: #f59e0b !important; }
.trap { background: #ef4444 !important; }

#panel {
    margin-top: 15px;
}

.bar {
    margin: 5px auto;
    width: 200px;
    height: 10px;
    background: #1e293b;
    border-radius: 5px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: #22c55e;
}
</style>
</head>

<body>

<h1>🧠 NeuroForge V3 Elite</h1>
<p>Adapt. Resist. Evolve.</p>

<div id="game"></div>

<div id="panel">
    <p id="status">Press Start</p>
    <p>Score: <span id="score">0</span></p>
    <p>Level: <span id="level">1</span></p>

    <p>Energy</p>
    <div class="bar"><div id="energyBar" class="fill"></div></div>

    <p>Brain Score</p>
    <p>🧠 Memory: <span id="mem">0</span> | ⚡ Impulse: <span id="imp">0</span> | 🎯 Decision: <span id="dec">0</span></p>

    <button onclick="startGame()">Start</button>
</div>

<script>
const size = 6;

let player, goal, fakeGoal, traps;
let score = 0, level = 1;
let energy = 10;
let memoryScore = 0, impulseScore = 0, decisionScore = 0;

let memoryPhase = true;
let timer;

const game = document.getElementById("game");

function rand() {
    return Math.floor(Math.random() * size * size);
}

function createGrid() {
    game.innerHTML = "";
    for (let i = 0; i < size*size; i++) {
        let tile = document.createElement("div");
        tile.className = "tile";
        tile.dataset.index = i;
        tile.onclick = () => move(i);
        game.appendChild(tile);
    }
}

function render(show=false) {
    document.querySelectorAll(".tile").forEach(tile => {
        let i = +tile.dataset.index;
        tile.className = "tile";

        if (i === player) tile.classList.add("player");

        if (show) {
            if (i === goal) tile.classList.add("goal");
            if (i === fakeGoal) tile.classList.add("fake");
            if (traps.includes(i)) tile.classList.add("trap");
        }
    });
}

function startGame() {
    player = 0;
    goal = rand();
    fakeGoal = rand();
    traps = Array.from({length: level+1}, rand);

    energy = 10 + level;
    memoryPhase = true;

    createGrid();
    render(true);

    updateUI("Memorize carefully...");

    setTimeout(() => {
        memoryPhase = false;
        render(false);
        startTimer();

        updateUI("Find real goal. Adapt!");

        setTimeout(ruleShift, 4000 - level*200);
    }, 2000);
}

function move(i) {
    if (memoryPhase || energy <= 0) return;

    player = i;
    energy--;
    updateEnergy();

    moveTraps();
    render(false);

    if (traps.includes(player)) {
        updateUI("💀 Trap!");
        impulseScore++;
        reset();
        return;
    }

    if (player === fakeGoal) {
        updateUI("⚠️ Fake!");
        impulseScore++;
        energy -= 2;
        return;
    }

    if (player === goal) {
        updateUI("✅ Success!");
        memoryScore++;
        decisionScore++;

        score += energy * level;
        level++;

        reset();
    }

    if (energy <= 0) {
        updateUI("⚡ Exhausted!");
        reset();
    }
}

function moveTraps() {
    traps = traps.map(t => {
        let dir = Math.floor(Math.random()*4);
        if (dir===0 && t%size!==0) return t-1;
        if (dir===1 && t%size!==size-1) return t+1;
        if (dir===2 && t-size>=0) return t-size;
        if (dir===3 && t+size<size*size) return t+size;
        return t;
    });
}

function ruleShift() {
    fakeGoal = goal;
    goal = rand();
    updateUI("⚠️ RULE SHIFT");
}

function startTimer() {
    clearInterval(timer);
    let t = 8;

    timer = setInterval(() => {
        t--;
        if (t <= 0) {
            updateUI("⏳ Time Up");
            reset();
        }
    }, 1000);
}

function reset() {
    clearInterval(timer);
    setTimeout(startGame, 1200);
}

function updateUI(msg) {
    document.getElementById("status").innerText = msg;
    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
    document.getElementById("mem").innerText = memoryScore;
    document.getElementById("imp").innerText = impulseScore;
    document.getElementById("dec").innerText = decisionScore;
    updateEnergy();
}

function updateEnergy() {
    let percent = (energy/(10+level))*100;
    document.getElementById("energyBar").style.width = percent + "%";
}
</script>

</body>
</html>
